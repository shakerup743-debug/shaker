  # ─── Security ─────────────────────────────────────────────────────────────

  /security/sessions:
    get:
      operationId: listSecuritySessions
      tags: [security]
      summary: List active sessions for current user (admin can pass ?userId=N)
      parameters:
        - name: userId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSession"

  /security/sessions/{id}:
    delete:
      operationId: revokeSession
      tags: [security]
      summary: Revoke a session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Session revoked
        "403":
          description: Forbidden
        "404":
          description: Session not found

  /security/events:
    get:
      operationId: listSecurityEvents
      tags: [security]
      summary: List security events (admin/owner only)
      parameters:
        - name: type
          in: query
          schema: { type: string }
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        "200":
          description: Security events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecurityEvent"

  /security/events/summary:
    get:
      operationId: getSecurityEventSummary
      tags: [security]
      summary: Aggregate security counts (admin/owner only)
