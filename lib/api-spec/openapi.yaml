          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }

  /security/mfa:
    delete:
      operationId: disableMfa
      tags: [security]
      summary: Disable MFA for requesting user (admin can disable for any user via ?userId=N)
      parameters:
        - name: userId
          in: query
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string }
      responses:
        "200":
          description: MFA disabled

# ─── Schemas ──────────────────────────────────────────────────────────────────

components:
  schemas:

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # Categories

    Category:
      type: object
      required: [id, name, color, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string

    # Products

    Product:
      type: object
      required: [id, name, price, isActive, categoryId, createdAt, kitchenAvailable]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isActive:
          type: boolean
        kitchenAvailable:
          type: boolean
          default: true
        unavailabilityReason:
          type: ["string", "null"]
          enum: [out_of_stock, temp_unavailable, ended_today, ingredient_out, paused, null]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required: [name, price, categoryId]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        categoryId:
          type: integer
        imageUrl:
          type: string
        isActive:
          type: boolean

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        categoryId:
          type: integer
        imageUrl:
          type: string
        isActive:
          type: boolean

    # Orders

    OrderItem:
      type: object
      required: [id, orderId, productId, productName, quantity, unitPrice, subtotal]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        subtotal:
          type: number
        notes:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, orderNumber, type, status, subtotal, tax, total, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: ["integer", "null"]
        orderNumber:
          type: string
        type:
          type: string
          enum: [dine_in, takeaway, delivery]
        status:
          type: string
          enum: [pending, preparing, ready, completed, cancelled]
        subtotal:
          type: number
        discount:
          type: number
        tax:
          type: number
        total:
          type: number
        paymentMethod:
          type: ["string", "null"]
          enum: [cash, card, mixed, null]
        amountPaid:
          type: ["number", "null"]
        changeAmount:
          type: ["number", "null"]
        tableNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]

    OrderItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1
        notes:
          type: string

    OrderInput:
      type: object
      required: [type, items]
      properties:
        type:
          type: string
          enum: [dine_in, takeaway, delivery]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"
        customerId:
          type: integer
        tableNumber:
          type: string
        discount:
          type: number
        notes:
          type: string
        paymentMethod:
          type: string
          enum: [cash, card, mixed]
        amountPaid:
          type: number

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, preparing, ready, completed, cancelled]
        discount:
          type: number
        tableNumber:
          type: string
        notes:
          type: string

    PaymentInput:
      type: object
      required: [paymentMethod]
      properties:
        paymentMethod:
          type: string
          enum: [cash, card, mixed]
        amountPaid:
          type: number

    # Kitchen

    KitchenTicket:
      type: object
      required: [id, orderId, orderNumber, status, type, items, createdAt]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
          enum: [new, in_progress, ready, completed]
        type:
          type: string
          enum: [dine_in, takeaway, delivery]
        tableNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TicketStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, in_progress, ready, completed]

    # Product Ingredients

    ProductIngredient:
      type: object
      required: [id, productId, inventoryId, quantityPerUnit, inventoryName, unit]
      properties:
        id:
          type: integer
        productId:
          type: integer
        inventoryId:
          type: integer
        quantityPerUnit:
          type: number
        inventoryName:
          type: string
        unit:
          type: string

    ProductIngredientInput:
      type: object
      required: [inventoryId, quantityPerUnit]
      properties:
        inventoryId:
          type: integer
        quantityPerUnit:
          type: number
          minimum: 0.0001

    ProductIngredientsInput:
      type: object
      required: [ingredients]
      properties:
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/ProductIngredientInput"

    # Inventory

    InventoryItem:
      type: object
      required: [id, name, quantity, unit, lowStockThreshold, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: number
        unit:
          type: string
        lowStockThreshold:
          type: number
        isLowStock:
          type: boolean
        consumedToday:
          type: number
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    InventoryInput:
      type: object
      required: [name, quantity, unit]
      properties:
        name:
          type: string
          minLength: 1
        quantity:
          type: number
          minimum: 0
        unit:
          type: string
        lowStockThreshold:
          type: number
        notes:
          type: string

    InventoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        quantity:
          type: number
        unit:
          type: string
        lowStockThreshold:
          type: number
        notes:
          type: string

    StockAdjustment:
      type: object
      required: [adjustment, reason]
      properties:
        adjustment:
          type: number
        reason:
          type: string

    # Public guest ordering

    PublicMenuItem:
      type: object
      required: [id, name, price, isActive, categoryId]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isActive:
          type: boolean
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    GuestOrderItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1
        notes:
          type: string

    GuestOrderInput:
      type: object
      required: [tableNumber, items]
      properties:
        tableNumber:
          type: string
          minLength: 1
        items:
          type: array
          items:
            $ref: "#/components/schemas/GuestOrderItemInput"
          minItems: 1
        notes:
          type: string

    GuestOrderResult:
      type: object
      required: [orderId, orderNumber, tableNumber, subtotal, tax, total, completionToken]
      properties:
        orderId:
          type: integer
        orderNumber:
          type: string
        tableNumber:
          type: string
        subtotal:
          type: number
        tax:
          type: number
        total:
          type: number
        completionToken:
          type: string
          description: Single-use token embedded in the QR code to authorise self-service completion

    # Reports

    DailyReport:
      type: object
      required: [date, totalRevenue, orderCount, averageOrderValue, completedOrders, cancelledOrders]
      properties:
        date:
          type: string
        totalRevenue:
          type: number
        orderCount:
          type: integer
        completedOrders:
          type: integer
        cancelledOrders:
          type: integer
        averageOrderValue:
          type: number
        cashRevenue:
          type: number
        cardRevenue:
          type: number
        taxCollected:
          type: number
        discountsGiven:
          type: number
        dineInOrders:
          type: integer
        takeawayOrders:
          type: integer
        deliveryOrders:
          type: integer

    TopProduct:
      type: object
      required: [productId, productName, totalSold, totalRevenue]
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalSold:
          type: integer
        totalRevenue:
          type: number
        categoryName:
          type: ["string", "null"]

    HourlySales:
      type: object
      required: [hour, orderCount, revenue]
      properties:
        hour:
          type: integer
        orderCount:
          type: integer
        revenue:
          type: number

    DashboardStats:
      type: object
      required: [todayRevenue, todayOrders, activeOrders, lowStockCount, weekRevenue]
      properties:
        todayRevenue:
          type: number
        todayOrders:
          type: integer
        activeOrders:
          type: integer
        lowStockCount:
          type: integer
        weekRevenue:
          type: number
        pendingKitchenTickets:
          type: integer
        yesterdayRevenue:
          type: number
        yesterdayOrders:
          type: integer
        prevWeekRevenue:
          type: number
        revenueTrend:
          type: number
          nullable: true
        ordersTrend:
          type: number
          nullable: true
        weekRevenueTrend:
          type: number
          nullable: true

    KpiReport:
      type: object
