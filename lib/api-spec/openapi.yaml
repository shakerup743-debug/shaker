openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FOODORO POS & Kitchen Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Product categories
  - name: products
    description: Menu products
  - name: orders
    description: Orders and POS
  - name: kitchen
    description: Kitchen display system
  - name: inventory
    description: Inventory management
  - name: reports
    description: Sales reports and analytics
  - name: admin
    description: Admin-only operations
  - name: public
    description: Public endpoints (no authentication required)
  - name: security
    description: Security center — sessions, events, MFA

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Categories ───────────────────────────────────────────────────────────

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ─── Products ─────────────────────────────────────────────────────────────

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products (optionally filter by category or active status)
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /products/{id}/ingredients:
    get:
      operationId: getProductIngredients
      tags: [products]
      summary: Get ingredients (recipe) for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductIngredient"
        "404":
          description: Not found
    put:
      operationId: setProductIngredients
      tags: [products]
      summary: Replace all ingredients for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductIngredientsInput"
      responses:
        "200":
          description: Updated ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductIngredient"
        "404":
          description: Not found

  /products/{id}/toggle:
    patch:
      operationId: toggleProduct
      tags: [products]
      summary: Toggle product active/inactive status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  # ─── Orders ───────────────────────────────────────────────────────────────

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (optionally filter by status or date)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, preparing, ready, completed, cancelled]
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order with its items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order (status, discount, payment method)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/{id}/complete:
    post:
      operationId: completeOrder
      tags: [orders]
      summary: Complete payment and finalize order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "200":
          description: Order completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  # ─── Kitchen ──────────────────────────────────────────────────────────────

  /kitchen/tickets:
    get:
      operationId: listKitchenTickets
      tags: [kitchen]
      summary: List kitchen tickets (active orders for KDS)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, in_progress, ready]
      responses:
        "200":
          description: Kitchen tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitchenTicket"

  /kitchen/tickets/{id}/status:
    patch:
      operationId: updateTicketStatus
      tags: [kitchen]
      summary: Update kitchen ticket status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KitchenTicket"
        "404":
          description: Not found

  /kitchen/availability:
    get:
      operationId: listKitchenAvailability
      tags: [kitchen]
      summary: List all active products with their kitchen availability status
      responses:
        "200":
          description: Product availability list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductAvailabilityItem"

  /kitchen/availability/log:
    get:
      operationId: getAvailabilityLog
      tags: [kitchen]
      summary: Get availability change log (audit trail)
      responses:
        "200":
          description: Availability log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductAvailabilityLogEntry"

  /kitchen/availability/{productId}:
    patch:
      operationId: setProductAvailability
      tags: [kitchen]
      summary: Set kitchen availability for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetProductAvailabilityBody"
      responses:
        "200":
          description: Updated availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductAvailabilityItem"
        "404":
          description: Product not found

  # ─── Inventory ────────────────────────────────────────────────────────────

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List inventory items
      parameters:
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create an inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/{id}:
    patch:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update inventory item stock or details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          description: Not found

  /inventory/{id}/adjust:
    post:
      operationId: adjustInventory
      tags: [inventory]
      summary: Manually adjust inventory stock level
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustment"
      responses:
        "200":
          description: Adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          description: Not found

  # ─── Waste Management ─────────────────────────────────────────────────────

  /waste:
    get:
      operationId: listWasteLogs
      tags: [waste]
      summary: List waste log entries
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: inventoryId
          in: query
          schema:
            type: integer
        - name: reason
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of waste entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WasteLog"
    post:
      operationId: createWasteLog
      tags: [waste]
      summary: Log a waste entry from the kitchen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWasteLogBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WasteLog"

  /waste/analytics:
    get:
      operationId: getWasteAnalytics
      tags: [waste]
      summary: Waste analytics — top wasted items, cost, trends
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Waste analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WasteAnalytics"

  # ─── Public (no auth) ─────────────────────────────────────────────────────

  /public/menu:
    get:
      operationId: getPublicMenu
      tags: [public]
      summary: Get active menu items for guest ordering (no auth)
      security: []
      responses:
        "200":
          description: Active products grouped by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicMenuItem"

  /public/orders:
    post:
      operationId: createGuestOrder
      tags: [public]
      summary: Place a guest order from QR table (no auth)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestOrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestOrderResult"
        "400":
          description: Validation error

  /public/orders/{id}/complete:
    post:
      operationId: completeGuestOrder
      tags: [public]
      summary: Self-service order completion from QR kiosk (token-authenticated)
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: tenantId
          in: query
          required: true
          schema: { type: integer }
        - name: token
          in: query
          required: true
          schema: { type: string }
          description: Completion token issued at order creation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "200":
          description: Order completed
        "400":
          description: Validation error or missing token
        "401":
          description: Invalid or missing completion token
        "404":
          description: Order not found
        "409":
          description: Order already completed

  # ─── Reports ──────────────────────────────────────────────────────────────

  /reports/daily:
    get:
      operationId: getDailyReport
      tags: [reports]
      summary: Get daily sales summary
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  /reports/top-products:
    get:
      operationId: getTopProducts
      tags: [reports]
      summary: Get top selling products
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /reports/hourly:
    get:
      operationId: getHourlySales
      tags: [reports]
      summary: Get hourly sales breakdown for a date
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Hourly breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlySales"

  /reports/dashboard:
    get:
      operationId: getDashboardStats
      tags: [reports]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /reports/monthly:
    get:
      operationId: getMonthlyReport
      tags: [reports]
      summary: Get monthly sales summary with daily breakdown
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Monthly report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReport"

  /reports/yearly:
    get:
      operationId: getYearlyReport
      tags: [reports]
      summary: Get yearly sales summary with monthly breakdown
      parameters:
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Yearly report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YearlyReport"

  /reports/kpis:
    get:
      operationId: getKpiReport
      tags: [reports]
      summary: Get comprehensive KPI metrics with period comparison
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: KPI report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiReport"

  /reports/by-category:
    get:
      operationId: getSalesByCategory
      tags: [reports]
      summary: Get sales breakdown by product category
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Category sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySales"

  /reports/by-weekday:
    get:
      operationId: getSalesByWeekday
      tags: [reports]
      summary: Get sales by day of the week
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Weekday sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeekdaySales"

  /auth/refresh:
    post:
      summary: Refresh auth token
      description: Issues a new 24h token given a still-valid current token. Records a token_refresh audit event.
      operationId: refreshToken
      tags: [health]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New token issued
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    required: [id, name, email, role]
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
        "401":
          description: Authentication required or user inactive

  /auth/logout:
    post:
      summary: Logout current user
      description: Invalidates the current session and records a logout audit event
      tags: [health]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out successfully
        "401":
          description: Authentication required

  /admin/audit-logs:
    get:
      summary: List audit logs
      description: Returns the last 500 audit log entries (admin only)
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Filter from date (YYYY-MM-DD)
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: Filter to date (YYYY-MM-DD)
        - in: query
          name: action
          schema:
            type: string
          description: "Filter by action: login, logout, order_created, order_completed, inventory_adjusted, user_created, user_updated"
        - in: query
          name: limit
          schema:
            type: integer
            maximum: 500
          description: Max results (default 500, max 500)
      responses:
        "200":
          description: Array of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"
        "401":
          description: Authentication required
        "403":
          description: Admin role required

  # ─── Customers ────────────────────────────────────────────────────────────

  /customers:
    get:
      operationId: listCustomers
      tags: [admin]
      summary: List customers
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: tier
          schema: { type: string }
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [admin]
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/stats/summary:
    get:
      operationId: getCustomerStats
      tags: [admin]
      summary: Customer stats summary
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerStats"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [admin]
      summary: Get customer by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [admin]
      summary: Update customer
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [admin]
      summary: Delete customer
      parameters:
        - in: path
          name: id
          required: true
