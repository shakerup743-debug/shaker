          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSetupResponse"

  /security/mfa/verify:
    post:
      operationId: verifyMfa
      tags: [security]
      summary: Confirm TOTP code to activate MFA
      requestBody:
        required: true
        content:
